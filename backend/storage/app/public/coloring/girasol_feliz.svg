<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Tallo -->
  <path d="M 100,120 C 100,160 90,180 90,200" fill="none" stroke="black" stroke-width="8" stroke-linecap="round" />
  <!-- Hojas -->
  <path d="M 95,160 C 60,160 40,140 50,130 C 70,120 95,140 95,160" fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" />
  <path d="M 98,140 C 130,130 150,110 140,100 C 120,90 100,120 98,140" fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Pétalos (forma simplificada estilo margarita/girasol) -->
  <path d="M 100,120 
           C 70,140 50,100 80,80 
           C 60,50 100,30 110,60 
           C 140,40 160,80 130,100 
           C 150,130 110,150 100,120 Z" 
        fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" />
        
  <!-- Centro del Girasol -->
  <circle cx="105" cy="90" r="25" fill="none" stroke="black" stroke-width="6" />
  
  <!-- Carita Feliz en el Centro -->
  <circle cx="95" cy="85" r="3" fill="black" />
  <circle cx="115" cy="85" r="3" fill="black" />
  <path d="M 95,100 C 105,105 115,100 115,100" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" />
</svg>
