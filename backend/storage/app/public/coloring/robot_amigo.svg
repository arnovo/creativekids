<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Antena -->
  <line x1="100" y1="50" x2="100" y2="20" stroke="black" stroke-width="6" stroke-linecap="round" />
  <circle cx="100" cy="15" r="8" fill="none" stroke="black" stroke-width="6" />
  
  <!-- Cabeza -->
  <rect x="60" y="50" width="80" height="60" rx="10" fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" />
  <!-- Ojos -->
  <rect x="75" y="65" width="15" height="15" fill="none" stroke="black" stroke-width="6" />
  <rect x="110" y="65" width="15" height="15" fill="none" stroke="black" stroke-width="6" />
  <!-- Boca (Línea de audio) -->
  <line x1="80" y1="95" x2="120" y2="95" stroke="black" stroke-width="4" stroke-linecap="round" />
  <line x1="85" y1="90" x2="85" y2="100" stroke="black" stroke-width="4" stroke-linecap="round" />
  <line x1="100" y1="85" x2="100" y2="105" stroke="black" stroke-width="4" stroke-linecap="round" />
  <line x1="115" y1="90" x2="115" y2="100" stroke="black" stroke-width="4" stroke-linecap="round" />

  <!-- Cuello -->
  <rect x="90" y="110" width="20" height="10" fill="none" stroke="black" stroke-width="6" />

  <!-- Cuerpo -->
  <rect x="50" y="120" width="100" height="70" rx="5" fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" />
  <!-- Botones del pecho -->
  <circle cx="80" cy="140" r="10" fill="none" stroke="black" stroke-width="5" />
  <circle cx="120" cy="140" r="10" fill="none" stroke="black" stroke-width="5" />
  
  <!-- Brazos -->
  <path d="M 50,130 C 20,130 20,170 40,180" fill="none" stroke="black" stroke-width="8" stroke-linecap="round" />
  <path d="M 150,130 C 180,130 180,170 160,180" fill="none" stroke="black" stroke-width="8" stroke-linecap="round" />
</svg>
