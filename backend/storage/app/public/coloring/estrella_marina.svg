<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Estrella base (5 puntas redondeadas) -->
  <path d="M 100,20 
           C 110,60 120,70 160,70 
           C 130,90 120,110 140,150 
           C 110,130 90,130 60,150 
           C 80,110 70,90 40,70 
           C 80,70 90,60 100,20 Z" 
        fill="none" stroke="black" stroke-width="6" stroke-linejoin="round" />
        
  <!-- Carita tierna -->
  <circle cx="85" cy="85" r="5" fill="black" />
  <circle cx="115" cy="85" r="5" fill="black" />
  <!-- Mejillas sonrojadas (indicadas por círculos vacíos) -->
  <circle cx="70" cy="95" r="6" fill="none" stroke="black" stroke-width="2" />
  <circle cx="130" cy="95" r="6" fill="none" stroke="black" stroke-width="2" />
  <!-- Boquita sonriente -->
  <path d="M 95,95 C 100,105 105,100 105,100" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" />
  
  <!-- Burbujas marinas -->
  <circle cx="150" cy="40" r="8" fill="none" stroke="black" stroke-width="3" />
  <circle cx="170" cy="20" r="4" fill="none" stroke="black" stroke-width="3" />
  <circle cx="30" cy="50" r="6" fill="none" stroke="black" stroke-width="3" />
</svg>
