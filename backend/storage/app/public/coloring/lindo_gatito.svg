  <line x1="155" y1="90" x2="180" y2="85" stroke="black" stroke-width="3" stroke-linecap="round" />
  <line x1="155" y1="95" x2="180" y2="95" stroke="black" stroke-width="3" stroke-linecap="round" />
  <line x1="115" y1="90" x2="90" y2="85" stroke="black" stroke-width="3" stroke-linecap="round" />
  <line x1="115" y1="95" x2="90" y2="95" stroke="black" stroke-width="3" stroke-linecap="round" />
  <!-- Cola -->
  <path d="M 60,140 C 30,140 30,80 50,70" fill="none" stroke="black" stroke-width="6" stroke-linecap="round" />
  <!-- Base -->
  <line x1="40" y1="150" x2="160" y2="150" stroke="black" stroke-width="6" stroke-linecap="round" />
