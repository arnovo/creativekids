  <path d="M 120,60 L 110,30 L 90,50" fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 150,80 L 170,50 L 140,40" fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Ojos y Nariz -->
