services:
  # ─── Nginx Reverse Proxy ─────────────────────────────────
  webserver:
    image: nginx:1.27-alpine
    container_name: creativakids-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - creativakids
    restart: unless-stopped

  # ─── Vue 3 + Vuetify + Vite Dev Server ───────────────────
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
    container_name: creativakids-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    expose:
      - "5173"
    environment:
      - NODE_ENV=development
    networks:
      - creativakids
    restart: unless-stopped

  # ─── Laravel 11 + PHP 8.3-FPM ────────────────────────────
  backend:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    container_name: creativakids-backend
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    expose:
      - "9000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-creativakids}
      - DB_USERNAME=${DB_USERNAME:-creativakids}
      - DB_PASSWORD=${DB_PASSWORD:-creativakids_secret}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - creativakids
    restart: unless-stopped

  # ─── PostgreSQL 16 ───────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: creativakids-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-creativakids}
      POSTGRES_USER: ${DB_USERNAME:-creativakids}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-creativakids_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-creativakids} -d ${DB_DATABASE:-creativakids}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - creativakids
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  frontend_node_modules:
    driver: local
  backend_vendor:
    driver: local

networks:
  creativakids:
    driver: bridge
